<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Store</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f4f4f9;
      color: #333;
    }
    header {
      background-color: #111;
      color: #fff;
      padding: 20px;
      text-align: center;
    }
    .container {
      max-width: 1000px;
      margin: 40px auto;
      padding: 0 20px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }
    .card {
      background: #fff;
      border-radius: 8px;
      padding: 20px;
      text-align: center;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    }
    .card img {
      max-width: 100%;
      height: 200px;
      object-fit: cover;
      border-radius: 6px;
    }
    .card h3 {
      margin: 15px 0 10px;
    }
    .card p {
      font-weight: bold;
      color: #2b8a3e;
      font-size: 1.2rem;
    }
    .btn {
      display: inline-block;
      background-color: #007bff;
      color: white;
      padding: 10px 20px;
      text-decoration: none;
      border-radius: 5px;
      margin-top: 10px;
      cursor: pointer;
    }
    .btn:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>

  <header>
    <h1>Welcome to My Store</h1>
    <p>Find the best deals online</p>
  </header>

  <div class="container">
    <h2>Featured Products</h2>
    <div class="grid">
      <!-- Product Item 1 -->
      <div class="card">
        <img src="https://via.placeholder.com/300" alt="Product Image">
        <h3>Sample Product</h3>
        <p>$29.99</p>
        <a href="#" class="btn">Buy Now</a>
      </div>
    </div>
  </div>

</body>
</html>
