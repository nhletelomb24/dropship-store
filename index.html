<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KicksVault | SA's Premier Sneaker Destination</title>
  <style>
    :root {
      --primary: #111111;
      --accent: #ff3e3e;
      --accent-hover: #e02b2b;
      --bg: #0d0d0d;
      --card-bg: #1a1a1a;
      --text: #ffffff;
      --text-muted: #aaaaaa;
      --border: #2a2a2a;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* --- NAVBAR --- */
    nav {
      background-color: var(--primary);
      border-bottom: 2px solid var(--accent);
      position: sticky;
      top: 0;
      z-index: 100;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-size: 1.8rem;
      font-weight: 900;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text);
    }

    .logo span {
      color: var(--accent);
    }

    .cart-btn-nav {
      position: relative;
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 10px 18px;
      border-radius: 30px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: background 0.2s ease, transform 0.2s ease;
    }

    .cart-btn-nav:hover {
      background: var(--accent-hover);
      transform: scale(1.05);
    }

    .cart-badge {
      background: #fff;
      color: var(--primary);
      border-radius: 50%;
      padding: 2px 7px;
      font-size: 0.8rem;
      font-weight: bold;
    }

    /* --- HERO HEADER --- */
    header {
      text-align: center;
      padding: 50px 20px 30px;
      background: linear-gradient(180deg, #161616 0%, var(--bg) 100%);
    }

    header h1 {
      font-size: 2.8rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 10px;
    }

    header p {
      color: var(--text-muted);
      font-size: 1.1rem;
    }

    /* --- CONTROLS SECTION (Search & Categories) --- */
    .controls-container {
      max-width: 1200px;
      margin: 20px auto 40px;
      padding: 0 20px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      align-items: center;
    }

    .search-box {
      width: 100%;
      max-width: 500px;
      position: relative;
    }

    .search-box input {
      width: 100%;
      padding: 14px 20px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 30px;
      color: var(--text);
      font-size: 1rem;
      outline: none;
      transition: border-color 0.3s ease;
    }

    .search-box input:focus {
      border-color: var(--accent);
    }

    .categories {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .cat-btn {
      background: var(--card-bg);
      color: var(--text-muted);
      border: 1px solid var(--border);
      padding: 8px 18px;
      border-radius: 20px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s ease;
    }

    .cat-btn:hover, .cat-btn.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    /* --- PRODUCT GRID --- */
    .container {
      max-width: 1200px;
      margin: 0 auto 60px;
      padding: 0 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 30px;
    }

    .card {
      background: var(--card-bg);
      border-radius: 12px;
      border: 1px solid var(--border);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
      animation: fadeIn 0.4s ease;
    }

    .card:hover {
      transform: translateY(-7px);
      border-color: var(--accent);
      box-shadow: 0 10px 25px rgba(255, 62, 62, 0.15);
    }

    .card-img-wrapper {
      background: #111;
      padding: 20px;
      text-align: center;
    }

    .card img {
      width: 100%;
      height: 200px;
      object-fit: contain;
      transition: transform 0.3s ease;
    }

    .card:hover img {
      transform: scale(1.05);
    }

    .card-content {
      padding: 20px;
      display: flex;
      flex-direction: column;
      flex-grow: 1;
      justify-content: space-between;
    }

    .card h3 {
      font-size: 1.1rem;
      margin-bottom: 6px;
    }

    .price {
      font-size: 1.25rem;
      font-weight: 800;
      color: var(--accent);
      margin-bottom: 12px;
    }

    /* Size Selector */
    .size-selector {
      margin-bottom: 15px;
    }

    .size-selector label {
      display: block;
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-bottom: 5px;
      text-transform: uppercase;
    }

    .sizes {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .size-btn {
      background: #111;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 4px 8px;
      font-size: 0.8rem;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .size-btn.selected, .size-btn:hover {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }

    .add-to-cart-btn {
      width: 100%;
      background: var(--primary);
      border: 1px solid var(--accent);
      color: #fff;
      padding: 12px 0;
      border-radius: 6px;
      font-weight: bold;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .add-to-cart-btn:hover {
      background: var(--accent);
    }

    /* --- CART SIDEBAR & OVERLAY --- */
    .cart-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      display: none;
      z-index: 200;
    }

    .cart-sidebar {
      position: fixed;
      top: 0;
      right: -400px;
      width: 100%;
      max-width: 400px;
      height: 100%;
      background: var(--card-bg);
      z-index: 201;
      display: flex;
      flex-direction: column;
      box-shadow: -5px 0 25px rgba(0,0,0,0.8);
      transition: right 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .cart-sidebar.open {
      right: 0;
    }

    .cart-header {
      padding: 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .close-cart {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 1.5rem;
      cursor: pointer;
    }

    .close-cart:hover {
      color: var(--accent);
    }

    .cart-items {
      flex-grow: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .cart-item {
      display: flex;
      gap: 15px;
      background: #111;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid var(--border);
      align-items: center;
    }

    .cart-item img {
      width: 60px;
      height: 60px;
      object-fit: contain;
    }

    .cart-item-details {
      flex-grow: 1;
    }

    .cart-item-details h4 {
      font-size: 0.95rem;
    }

    .cart-item-details p {
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    .cart-item-price {
      color: var(--accent);
      font-weight: bold;
    }

    .quantity-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 5px;
    }

    .qty-btn {
      background: var(--border);
      color: var(--text);
      border: none;
      width: 24px;
      height: 24px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
    }

    .qty-btn:hover {
      background: var(--accent);
    }

    .cart-footer {
      padding: 20px;
      border-top: 1px solid var(--border);
      background: #111;
    }

    .cart-total {
      display: flex;
      justify-content: space-between;
      font-size: 1.2rem;
      font-weight: bold;
      margin-bottom: 15px;
    }

    .checkout-btn {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 14px 0;
      border-radius: 6px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .checkout-btn:hover {
      background: var(--accent-hover);
    }

    footer {
      text-align: center;
      padding: 30px;
      background-color: var(--primary);
      color: var(--text-muted);
      border-top: 1px solid var(--border);
      font-size: 0.9rem;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav>
    <div class="logo">Kicks<span>Vault</span></div>
    <button class="cart-btn-nav" onclick="toggleCart()">
      🛒 Cart <span class="cart-badge" id="cart-count">0</span>
    </button>
  </nav>

  <!-- HERO HEADER -->
  <header>
    <h1>KicksVault</h1>
    <p>Exclusive Air Jordans & Streetwear Delivered Across South Africa</p>
  </header>

  <!-- SEARCH & CATEGORIES -->
  <div class="controls-container">
    <div class="search-box">
      <input type="text" id="search-input" placeholder="Search sneakers..." oninput="filterProducts()">
    </div>
    <div class="categories">
      <button class="cat-btn active" onclick="setCategory('all', this)">All</button>
      <button class="cat-btn" onclick="setCategory('jordan', this)">Air Jordan</button>
      <button class="cat-btn" onclick="setCategory('airforce', this)">Air Force</button>
      <button class="cat-btn" onclick="setCategory('shox', this)">Shox</button>
    </div>
  </div>

  <!-- PRODUCTS CONTAINER -->
  <div class="container">
    <div class="grid" id="product-grid"></div>
  </div>

  <!-- CART SIDEBAR & OVERLAY -->
  <div class="cart-overlay" id="cart-overlay" onclick="toggleCart()"></div>
  <div class="cart-sidebar" id="cart-sidebar">
    <div class="cart-header">
      <h3>Your Cart</h3>
      <button class="close-cart" onclick="toggleCart()">&times;</button>
    </div>
    <div class="cart-items" id="cart-items">
      <!-- Items dynamically added here -->
    </div>
    <div class="cart-footer">
      <div class="cart-total">
        <span>Total:</span>
        <span id="cart-total-price">R 0.00</span>
      </div>
      <button class="checkout-btn" onclick="checkout()">Proceed to Checkout</button>
    </div>
  </div>

  <footer>
    <p>&copy; 2026 KicksVault. All rights reserved.</p>
  </footer>

  <script>
    // --- 1. PRODUCT CATALOG DATA ---
    const products = [
      { id: 1, name: "Nike Air Force 1 '07", category: "airforce", price: 2199, image: "images/af1.jpg" },
      { id: 2, name: "Air Jordan 1 High OG", category: "jordan", price: 3499, image: "images/jordan1-high.jpg" },
      { id: 3, name: "Air Jordan 1 Mid", category: "jordan", price: 2699, image: "images/jordan1-mid.jpg" },
      { id: 4, name: "Air Jordan 1 Retro", category: "jordan", price: 3299, image: "images/jordan1-retro.jpg" },
      { id: 5, name: "Air Jordan 4 Retro", category: "jordan", price: 3899, image: "images/jordan4-retro.jpg" },
      { id: 6, name: "Jordan 4 Retro 'Fear'", category: "jordan", price: 4199, image: "images/jordan4-fear.jpg" },
      { id: 7, name: "Jordan 4 'White Thunder'", category: "jordan", price: 4299, image: "images/jordan4-white-thunder.jpg" },
      { id: 8, name: "Nike Shox TL", category: "shox", price: 2899, image: "images/nike-shox-tl.jpg" }
    ];

    let currentCategory = 'all';
    let selectedSizes = {};
    let cart = [];

    // --- 2. RENDER PRODUCTS ---
    function renderProducts() {
      const grid = document.getElementById('product-grid');
      const searchTerm = document.getElementById('search-input').value.toLowerCase();
      
      grid.innerHTML = '';

      const filtered = products.filter(p => {
        const matchesCategory = currentCategory === 'all' || p.category === currentCategory;
        const matchesSearch = p.name.toLowerCase().includes(searchTerm);
        return matchesCategory && matchesSearch;
      });

      if (filtered.length === 0) {
        grid.innerHTML = `<p style="grid-column: 1/-1; text-align: center; color: var(--text-muted);">No sneakers found matching your search.</p>`;
        return;
      }

      filtered.forEach(product => {
        if (!selectedSizes[product.id]) selectedSizes[product.id] = 'UK 7';

        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <div class="card-img-wrapper">
            <img src="${product.image}" alt="${product.name}">
          </div>
          <div class="card-content">
            <div>
              <h3>${product.name}</h3>
              <div class="price">R ${product.price.toLocaleString('en-ZA')}.00</div>
              
              <div class="size-selector">
                <label>Select Size:</label>
                <div class="sizes">
                  ${['UK 6', 'UK 7', 'UK 8', 'UK 9', 'UK 10'].map(size => `
                    <button class="size-btn ${selectedSizes[product.id] === size ? 'selected' : ''}" 
                      onclick="selectSize(${product.id}, '${size}')">${size}</button>
                  `).join('')}
                </div>
              </div>
            </div>

            <button class="add-to-cart-btn" onclick="addToCart(${product.id})">Add To Cart</button>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    // --- 3. SIZE & CATEGORY CONTROLS ---
    function selectSize(productId, size) {
      selectedSizes[productId] = size;
      renderProducts();
    }

    function setCategory(cat, btn) {
      currentCategory = cat;
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderProducts();
    }

    function filterProducts() {
      renderProducts();
    }

    // --- 4. CART SYSTEM ---
    function addToCart(productId) {
      const product = products.find(p => p.id === productId);
      const size = selectedSizes[productId];

      const existingIndex = cart.findIndex(item => item.id === productId && item.size === size);

      if (existingIndex > -1) {
        cart[existingIndex].qty += 1;
      } else {
        cart.push({ ...product, size: size, qty: 1 });
      }

      updateCart();
      toggleCart(true); // Open cart sidebar automatically when adding
    }

    function updateQuantity(index, change) {
      cart[index].qty += change;
      if (cart[index].qty <= 0) {
        cart.splice(index, 1);
      }
      updateCart();
    }

    function updateCart() {
      const cartItemsContainer = document.getElementById('cart-items');
      const cartCount = document.getElementById('cart-count');
      const cartTotal = document.getElementById('cart-total-price');

      cartItemsContainer.innerHTML = '';
      let total = 0;
      let count = 0;

      if (cart.length === 0) {
        cartItemsContainer.innerHTML = `<p style="text-align: center; color: var(--text-muted); margin-top: 20px;">Your cart is empty.</p>`;
      } else {
        cart.forEach((item, index) => {
          total += item.price * item.qty;
          count += item.qty;

          const cartItem = document.createElement('div');
          cartItem.className = 'cart-item';
          cartItem.innerHTML = `
            <img src="${item.image}" alt="${item.name}">
            <div class="cart-item-details">
              <h4>${item.name}</h4>
              <p>Size: ${item.size}</p>
              <div class="cart-item-price">R ${item.price.toLocaleString('en-ZA')}.00</div>
              <div class="quantity-controls">
                <button class="qty-btn" onclick="updateQuantity(${index}, -1)">-</button>
                <span>${item.qty}</span>
                <button class="qty-btn" onclick="updateQuantity(${index}, 1)">+</button>
              </div>
            </div>
          `;
          cartItemsContainer.appendChild(cartItem);
        });
      }

      cartCount.textContent = count;
      cartTotal.textContent = `R ${total.toLocaleString('en-ZA')}.00`;
    }

    function toggleCart(forceOpen = false) {
      const sidebar = document.getElementById('cart-sidebar');
      const overlay = document.getElementById('cart-overlay');
      
      if (forceOpen || !sidebar.classList.contains('open')) {
        sidebar.classList.add('open');
        overlay.style.display = 'block';
      } else {
        sidebar.classList.remove('open');
        overlay.style.display = 'none';
      }
    }

    function checkout() {
      if (cart.length === 0) {
        alert("Your cart is empty!");
        return;
      }
      alert("Redirecting to secure payment checkout...");
      // Here you will redirect to your Yoco/PayFast payment link
    }

    // Initialize page
    renderProducts();
  </script>
</body>
</html>>
